name: Request support for my printer
description: Help add support for an AnyCubic printer that isn't listed yet.
title: "[Printer]: "
labels: ["printer-support"]
body:
  - type: markdown
    attributes:
      value: |
        Help me add your AnyCubic printer! The integration does the detective work — just attach its
        diagnostics. Nothing to install or run by hand:

        1. Install the integration and add your printer. It connects for **any** printer in the
           Kobra 3 / S1 family, even unlisted ones (you'll get the base entities).
        2. On the printer's device page in Home Assistant: ⋮ → **Download diagnostics**
           (automatically redacted of addresses and identifiers).
        3. Drag that file into the **Diagnostics file** box below.

        The diagnostics include a `capabilities` block with everything needed to add your model.
  - type: input
    id: model_name
    attributes:
      label: Printer model (marketing name)
      placeholder: e.g. Kobra 3 Max
    validations:
      required: true
  - type: input
    id: firmware
    attributes:
      label: Firmware version
      description: Printer screen → Settings → (About / Version).
      placeholder: e.g. 2.5.9.9
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics file
      description: >
        Attach the redacted "Download diagnostics" file here (drag & drop). This is the important
        bit — its `capabilities` block tells me the model ID, feature map, and camera/ACE presence.
      placeholder: Drag the downloaded diagnostics file into this box.
    validations:
      required: true
  - type: checkboxes
    id: hardware
    attributes:
      label: Which features does your printer physically have? (quick cross-check)
      options:
        - label: Enclosed / heated chamber with a door
        - label: Built-in camera
        - label: Multicolor box attached (ACE / ACE 2)
        - label: Touchscreen
        - label: Auto-leveling
  - type: textarea
    id: cant_connect
    attributes:
      label: Can't connect?
      description: >
        If the integration can't add your printer at all (e.g. an older Kobra 2 or a Kobra X on a
        different protocol), paste any error message here. Diagnostics won't be available in that
        case — your model + firmware above still help.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the "Supported printers" table and my model isn't already listed.
          required: true
